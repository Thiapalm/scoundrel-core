name: CI and Release

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build-core
          cd build-core
          cmake .. -DBUILD_WITH_SDL=OFF

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build-core
          cmake --build . --config Release

      - name: Run Tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build-core
          ctest --output-on-failure

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir build-core
          cd build-core
          cmake .. -G "Visual Studio 17 2022" -DBUILD_WITH_SDL=OFF

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build-core
          cmake --build . --config Release

      - name: Run Tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build-core
          ctest -C Release --output-on-failure

      - name: Upload Linux Library Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: libScoundrelCore-linux
          path: build-core/libScoundrelCore.a

      - name: Upload Windows Library Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ScoundrelCore-windows
          path: build-core/Release/ScoundrelCore.lib

  release:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: get_version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'version:\s*[\'\"]?([^\'\"]+)[\'\"]?', open('version.yaml').read()).group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux Library
        uses: actions/download-artifact@v4
        with:
          name: libScoundrelCore-linux
          path: temp-linux

      - name: Download Windows Library
        uses: actions/download-artifact@v4
        with:
          name: ScoundrelCore-windows
          path: temp-windows

      - name: Generate Versioned Package
        run: |
          mkdir -p scoundrel-core/include
          mkdir -p scoundrel-core/lib/linux
          mkdir -p scoundrel-core/lib/windows
          mkdir -p scoundrel-core/assets/locales

          # Copy headers preserving directory structure
          cd src
          find . -name "*.h" -exec cp --parents {} ../scoundrel-core/include/ \;
          cd ..

          # Copy libraries from downloaded artifacts
          cp temp-linux/libScoundrelCore.a scoundrel-core/lib/linux/
          cp temp-windows/ScoundrelCore.lib scoundrel-core/lib/windows/

          # Copy assets/locales
          cp -r assets/locales/*.json scoundrel-core/assets/locales/

          # Copy version.yaml
          cp version.yaml scoundrel-core/

          # Create README.md
          cat << 'EOF' > scoundrel-core/README.md
          # Scoundrel Core Precompiled Library

          This package contains the precompiled `ScoundrelCore` static library for both Linux and Windows, alongside all necessary headers and localization assets.

          ## Contents

          - `include/`: C++ header files. Add this path to your compiler's include search paths.
          - `lib/linux/libScoundrelCore.a`: Precompiled static library for Linux (x64).
          - `lib/windows/ScoundrelCore.lib`: Precompiled static library for Windows (x64).
          - `assets/locales/`: Localization JSON files (en.json, es.json, pt.json) used by the engine.
          - `version.yaml`: Version metadata file.

          ## Integration

          ### include directory
          Add `include/` to your build system's include paths. 
          For CMake: `target_include_directories(your_target PRIVATE include/)`

          ### lib linking
          Link with the appropriate static library for your platform:
          - Linux: `lib/linux/libScoundrelCore.a`
          - Windows: `lib/windows/ScoundrelCore.lib`
          EOF

          # Create zip package
          zip -r scoundrel-core-${{ env.VERSION }}.zip scoundrel-core/

      - name: Create Tag and Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a release. If tag already exists, gh release create will use it, otherwise it creates it.
          # We use --generate-notes to auto-populate release notes with the merged PR/commit history.
          gh release create v${{ env.VERSION }} scoundrel-core-${{ env.VERSION }}.zip \
            --title "Release v${{ env.VERSION }}" \
            --generate-notes

      - name: Merge back into develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch and checkout develop branch
          git fetch origin develop:develop
          git checkout develop
          
          # Merge main into develop
          git merge origin/main -m "chore: merge main back into develop [skip ci]"
          
          # Push changes back to origin
          git push origin develop
